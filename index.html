<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Node Taker</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background-color: #f0f0f0;
        }

        textarea {
            width: 100%;
            height: 60vh;
            font-size: 16px;
            padding: 15px;
        }

        button {
            padding: 12px, 30px;
            font-size: 16px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Quick Note Taker</h1>
    <textarea id="note" placeholder="Start typing your note  here..."></textarea>
    <br><br>
    <button id="save"> Save Note</button>
    <button id="save-as"> Save As</button>
    <div id="status" style="margin-top: 10px; color:#666; font-size :0.9em;"></div>
    <script src="renderer.js"></script>

</body>

</html>
